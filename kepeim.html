<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Képek – Portfólió</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="container gallery-page">
        <a href="index.html#projects" class="back-to-portfolio" title="Vissza a portfólióra"><i class="fas fa-arrow-left"></i> Vissza a portfólióra</a>
        <h1 class="section-title">Képek</h1>
        <p class="gallery-intro">
            Főként Photoshoppal készült képek.
        </p>
        <section class="gallery-grid">
            <article class="gallery-item">
                <button type="button" class="gallery-img-wrap" aria-label="Kép nagyítása">
                    <img src="cipo.png" alt="Nike Air Force 1" loading="lazy" class="gallery-img" data-lightbox onerror="this.onerror=null;this.src='images/cipo.png';">
                </button>
                <h2 class="gallery-caption">🟣</h2>
            </article>
            <article class="gallery-item">
                <button type="button" class="gallery-img-wrap" aria-label="Kép nagyítása">
                    <img src="szarvas.png" alt="Szarvas" loading="lazy" class="gallery-img" data-lightbox onerror="this.onerror=null;this.src='images/szarvas.png';">
                </button>
                <h2 class="gallery-caption">🦌 ✨</h2>
            </article>
            <article class="gallery-item">
                <button type="button" class="gallery-img-wrap" aria-label="Kép nagyítása">
                    <img src="vulcan.png" alt="Vulcan AK-47" loading="lazy" class="gallery-img" data-lightbox onerror="this.onerror=null;this.src='images/vulcan.png';">
                </button>
                <h2 class="gallery-caption gallery-caption--blue">Vulcan AK-47</h2>
            </article>
            <article class="gallery-item">
                <button type="button" class="gallery-img-wrap" aria-label="Kép nagyítása">
                    <img src="mrbeast.png" alt="MrBeast effect" loading="lazy" class="gallery-img" data-lightbox onerror="this.onerror=null;this.src='images/mrbeast.png';">
                </button>
                <h2 class="gallery-caption gallery-caption--red">MrBeast effect</h2>
            </article>
        </section>
    </main>

    <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Nagyított kép" aria-hidden="true">
        <div class="lightbox-backdrop"></div>
        <button type="button" class="lightbox-close" aria-label="Bezárás"><i class="fas fa-times"></i></button>
        <div class="lightbox-inner">
            <img src="" alt="" class="lightbox-img">
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2025 Portfolio. All rights reserved.</p>
                <div class="social-links">
                    <a href="https://instagram.com/petkowr" target="_blank" rel="noopener noreferrer">
                        <i class="fab fa-instagram"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var lb = document.getElementById('lightbox');
        var lbImg = document.querySelector('.lightbox-img');
        var lbClose = document.querySelector('.lightbox-close');
        var backdrop = document.querySelector('.lightbox-backdrop');
        if (!lb || !lbImg) return;

        function openLb(img) {
            lbImg.src = img.src;
            lbImg.alt = img.alt;
            lb.classList.add('lightbox-open');
            lb.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
        }
        function closeLb() {
            lb.classList.remove('lightbox-open');
            lb.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        }

        document.querySelectorAll('.gallery-img-wrap').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var img = btn.querySelector('img');
                if (img) openLb(img);
            });
        });
        if (lbClose) lbClose.addEventListener('click', closeLb);
        if (backdrop) backdrop.addEventListener('click', closeLb);
        lb.addEventListener('click', function(e) { if (e.target === lb) closeLb(); });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLb(); });
    });
    </script>
</body>
</html>
